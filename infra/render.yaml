# render.yaml
# Render Blueprint — deploys all three services from a single monorepo.
# Docs: https://render.com/docs/blueprint-spec
#
# Services:
#   1. frontend  — React SPA (static site, served via Render CDN)
#   2. backend   — FastAPI REST + SSE API
#   3. collab    — y-websocket collaboration server
#   4. db        — PostgreSQL 16 (managed)
#
# All services are deployed to the same Render region (Frankfurt by default)
# to minimise intra-service latency (ADR: latency sensitivity).

databases:
  - name: collab-editor-db
    databaseName: collab_editor
    plan: starter         # upgrade to standard for production
    region: frankfurt
    postgresMajorVersion: "16"

services:

  # -------------------------------------------------------------------
  # 1. FastAPI Backend
  # -------------------------------------------------------------------
  - type: web
    name: collab-editor-backend
    runtime: python
    region: frankfurt
    plan: starter
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: collab-editor-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true       # Render generates a secure random value
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_ACCESS_TOKEN_EXPIRE_MINUTES
        value: "15"
      - key: JWT_REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: GROQ_API_KEY
        sync: false               # Must be set manually in Render dashboard
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: GROQ_FALLBACK_MODEL
        value: llama-3.1-8b-instant
      - key: GROQ_REQUEST_TIMEOUT_SECONDS
        value: "30"
      - key: AI_PER_USER_DAILY_TOKEN_LIMIT
        value: "50000"
      - key: AI_PER_REQUEST_TOKEN_CAP
        value: "4000"
      - key: CORS_ORIGINS
        value: https://collab-editor-frontend.onrender.com
      - key: PYTHON_VERSION
        value: "3.12"

  # -------------------------------------------------------------------
  # 2. y-websocket Collaboration Server
  # -------------------------------------------------------------------
  - type: web
    name: collab-editor-collab
    runtime: node
    region: frankfurt
    plan: starter
    rootDir: backend/collab
    buildCommand: npm ci
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: collab-editor-db
          property: connectionString
      - key: COLLAB_PORT
        value: "10000"            # Render maps $PORT; server.js reads COLLAB_PORT
      - key: JWT_SECRET
        fromService:
          name: collab-editor-backend
          type: web
          property: JWT_SECRET    # Share the same secret as the backend
      - key: COLLAB_SYSTEM_USER_ID
        sync: false               # Set to a real UUID from your users table
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"

  # -------------------------------------------------------------------
  # 3. React SPA (Static Site)
  # -------------------------------------------------------------------
  - type: web
    name: collab-editor-frontend
    runtime: static
    region: frankfurt
    rootDir: client
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    headers:
      # Cache static assets aggressively; HTML must revalidate
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      # SPA fallback — all routes serve index.html
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://collab-editor-backend.onrender.com
      - key: VITE_COLLAB_WS_URL
        value: wss://collab-editor-collab.onrender.com
        
